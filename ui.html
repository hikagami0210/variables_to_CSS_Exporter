<!doctype html>
<html lang="ja">
  <head>
    <title>Figma Variables to CSS Exporter</title>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        margin: 0;
        background: #f5f5f5;
        color: #333;
      }
      h1 {
        font-size: 14px;
        margin-top: 0;
        margin-bottom: 12px;
      }

      .control-group {
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      label {
        font-size: 12px;
        font-weight: 600;
      }
      select {
        padding: 6px;
        font-size: 13px;
        border: 1px solid #d0d7de;
        border-radius: 4px;
        flex: 1;
        outline: none;
        background: #fff;
      }
      select:focus {
        border-color: #0d99ff;
      }

      textarea {
        width: 100%;
        height: 460px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        padding: 12px;
        box-sizing: border-box;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        resize: none;
        background: #fff;
        line-height: 1.4;
        white-space: pre;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      button {
        flex: 1;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        transition: background 0.2s;
      }
      .btn-primary {
        background: #0d99ff;
        color: white;
      }
      .btn-primary:hover {
        background: #007be5;
      }
      .btn-secondary {
        background: #fff;
        color: #333;
        border: 1px solid #d0d7de;
      }
      .btn-secondary:hover {
        background: #f3f4f6;
      }
    </style>
  </head>
  <body>
    <h1>Figma Variables to CSS Exporter</h1>

    <div class="control-group">
      <label for="format-select">出力形式:</label>
      <select id="format-select">
        <option value="tailwind">Tailwind CSS v4 (@theme)</option>
        <option value="standard">Standard CSS (:root)</option>
      </select>
    </div>

    <textarea id="css-output" readonly aria-label="CSS Output">
        Loading variables from Figma...
    </textarea>

    <div class="actions">
      <button class="btn-secondary" id="copy-btn">コピー</button>
      <button class="btn-primary" id="download-btn">ダウンロード (.css)</button>
    </div>

    <script>
      let generatedCSS = "";

      // バックエンドへの変換リクエスト関数
      function requestGeneration() {
        const format = document.getElementById("format-select").value;
        document.getElementById("css-output").value = "コードを生成中...";
        // code.ts にメッセージを送信
        parent.postMessage(
          { pluginMessage: { type: "generate", format: format } },
          "*",
        );
      }

      // 初期ロード時、およびセレクトボックス変更時に自動リクエスト
      window.onload = requestGeneration;
      document
        .getElementById("format-select")
        .addEventListener("change", requestGeneration);

      // バックエンドからの結果受信
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (message.type === "export-css") {
          generatedCSS = message.data;
          document.getElementById("css-output").value = generatedCSS;
        }
      };

      // クリップボードへコピー
      document.getElementById("copy-btn").onclick = () => {
        const textarea = document.getElementById("css-output");
        textarea.select();
        document.execCommand("copy");
        const btn = document.getElementById("copy-btn");
        btn.textContent = "コピー完了！";
        setTimeout(() => (btn.textContent = "コピー"), 2000);
      };

      // ファイルダウンロード
      document.getElementById("download-btn").onclick = () => {
        if (!generatedCSS) return;
        const blob = new Blob([generatedCSS], { type: "text/css" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        // フォーマットによってダウンロードされるファイル名を変更
        const format = document.getElementById("format-select").value;
        a.download = format === "tailwind" ? "theme.css" : "variables.css";
        a.click();
        URL.revokeObjectURL(url);
      };
    </script>
  </body>
</html>
