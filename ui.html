<!doctype html>
<html lang="ja">
  <head>
    <title>Variables to CSS Exporter</title>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        margin: 0;
        background: #f5f5f5;
        color: #333;
      }
      h2 {
        font-size: 14px;
        margin-top: 0;
      }
      textarea {
        width: 100%;
        height: 360px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        padding: 12px;
        box-sizing: border-box;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        resize: none;
        background: #fff;
        line-height: 1.4;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      button {
        flex: 1;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        transition: background 0.2s;
      }
      .btn-primary {
        background: #0d99ff;
        color: white;
      }
      .btn-primary:hover {
        background: #007be5;
      }
      .btn-secondary {
        background: #fff;
        color: #333;
        border: 1px solid #d0d7de;
      }
      .btn-secondary:hover {
        background: #f3f4f6;
      }
    </style>
  </head>
  <body>
    <h1>Variables to CSS Exporter</h1>
    <textarea id="css-output" readonly aria-label="エクスポートされたCSS変数">
      Figmaからバリアブルを読み込んでいます...
    </textarea>
    <div class="actions">
      <button class="btn-secondary" id="copy-btn">
        クリップボードにコピー
      </button>
      <button
        class="btn-primary"
        id="download-btn"
        aria-label="ダウンロード (.css)"
      >
        cssファイルをダウンロード
      </button>
    </div>

    <script>
      let generatedCSS = "";

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (message.type === "export-css") {
          generatedCSS = message.data;
          document.getElementById("css-output").value = generatedCSS;
        }
      };

      document.getElementById("copy-btn").onclick = () => {
        const textarea = document.getElementById("css-output");
        textarea.select();
        document.execCommand("copy");
        const btn = document.getElementById("copy-btn");
        btn.textContent = "コピー完了！";
        setTimeout(() => (btn.textContent = "クリップボードにコピー"), 2000);
      };

      document.getElementById("download-btn").onclick = () => {
        if (!generatedCSS) return;
        const blob = new Blob([generatedCSS], { type: "text/css" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "design-tokens.css";
        a.click();
        URL.revokeObjectURL(url);
      };

      // data-testid="pluginPanelContainer" のpaddingBottomを0にする
      const pluginPanelContainer = document.querySelector(
        "[data-testid='pluginPanelContainer']",
      );
      if (pluginPanelContainer) {
        pluginPanelContainer.style.paddingBottom = "0";
      }
    </script>
  </body>
</html>
